name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from GitHub

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set lowercase repository name
      id: repo
      run: |
        # Convert repository name to lowercase for Docker tags
        echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push app image
      run: |
        # Use lowercase repository name
        IMAGE_NAME="${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:latest"
        
        echo "Building image: $IMAGE_NAME"
        
        # Build the app image (same as 'make build-app')
        docker build --target app -t "$IMAGE_NAME" .
        
        # Push to registry
        docker push "$IMAGE_NAME"
        
        echo "Image pushed to: $IMAGE_NAME"
        echo "Add this to the .env file:"
        echo "DOCKER_IMAGE=$IMAGE_NAME"